<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SpectroDraw — Sneak Peek</title>
  <style>
    /* ensure the inlineSneak element fills the viewport */
    html, body { height: 100%; margin: 0; }
    #inlineSneak { width: 100%; height: 100%; box-sizing: border-box; position: relative; overflow-y:hidden;}

    /* loader styles */
    .loader-container {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 18px 22px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border-radius: 8px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      z-index: 9999;
    }
    .loader {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.9);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* basic safe container for the Pro iframe or content */
    .pro-container { width:100%; height:100%; }
    .pro-iframe { width:100%; height:100%; border:0; display:block; }

    /* small fallback message */
    .fallback-msg { position:absolute; left: 8px; bottom: 8px; font-size:13px; color: rgba(0,0,0,0.6); }
  </style>
</head>
<body>
  <div id="inlineSneak" aria-live="polite"></div>

  <script>
    // sneakpeek bootstrap script — loads SpectroDraw Pro bundle from KV and waits for 'spectrodraw-pro-ready'
    (function () {
      let hasLoadedPro = false;

      async function loadPro() {
        if (window.__spectrodraw_pro_loading) return;
        if (hasLoadedPro) return;
        window.__spectrodraw_pro_loading = true;

        const inlineSneak = document.getElementById('inlineSneak');
        if (!inlineSneak) {
          console.warn('inlineSneak not found, aborting loadPro');
          window.__spectrodraw_pro_loading = false;
          return;
        }
        
        if (navigator.userAgentData.mobile) {
          if (window.innerWidth<window.innerHeight) {
            inlineSneak.innerHTML = `<p>Please rotate your device horizontally.</p>
<svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 viewBox="0 0 122.88 106.43" style="enable-background:new 0 0 122.88 106.43;width:200px;" xml:space="preserve">
<style type="text/css">
	.st0{fill-rule:evenodd;clip-rule:evenodd;}
</style>
<g>
	<path class="st0" d="M11.1,0h35.63c3.05,0,5.85,1.25,7.85,3.25c2.03,2.03,3.25,4.8,3.25,7.85v31.46h-3.19V12.18H3.15v75.26l0,0
		h7.61v11.61c0,1.58,0.27,3.1,0.77,4.51H11.1c-3.05,0-5.85-1.25-7.85-3.25C1.22,98.27,0,95.51,0,92.45V11.1
		c0-3.05,1.25-5.85,3.25-7.85C5.28,1.22,8.04,0,11.1,0L11.1,0L11.1,0z M94.95,33.45c-0.37-5.8-2.64-10.56-6.06-13.97
		c-3.64-3.63-8.59-5.74-13.94-5.93l2.46,2.95c0.73,0.88,0.62,2.18-0.26,2.91c-0.88,0.73-2.18,0.62-2.91-0.26l-5.72-6.85l0,0
		c-0.72-0.86-0.62-2.14,0.22-2.88l6.71-5.89c0.86-0.75,2.16-0.66,2.91,0.19c0.75,0.86,0.66,2.16-0.19,2.91l-3.16,2.78
		c6.43,0.21,12.4,2.75,16.8,7.13c4.07,4.06,6.79,9.69,7.25,16.49l2.58-3.08c0.73-0.88,2.04-0.99,2.91-0.26
		c0.88,0.73,0.99,2.04,0.26,2.91l-5.73,6.84c-0.72,0.86-1.99,0.99-2.87,0.29l-6.98-5.56c-0.89-0.71-1.04-2.01-0.33-2.91
		c0.71-0.89,2.01-1.04,2.91-0.33L94.95,33.45L94.95,33.45z M122.88,59.7v35.63c0,3.05-1.25,5.85-3.25,7.85
		c-2.03,2.03-4.8,3.25-7.85,3.25h-78.9c-3.05,0-5.85-1.25-7.85-3.25c-2.03-2.03-3.25-4.8-3.25-7.85V59.7c0-3.05,1.25-5.85,3.25-7.85
		c2.03-2.03,4.79-3.25,7.85-3.25h78.9c3.05,0,5.85,1.25,7.85,3.25C121.66,53.88,122.88,56.64,122.88,59.7L122.88,59.7L122.88,59.7z
		 M35.41,77.49c0,2.51-2.03,4.57-4.57,4.57c-2.51,0-4.57-2.03-4.57-4.57c0-2.51,2.03-4.57,4.57-4.57
		C33.36,72.92,35.41,74.95,35.41,77.49L35.41,77.49L35.41,77.49z M37.88,51.75v51.49h72.82V51.75H37.88L37.88,51.75z"/>
</g>
</svg>
`;
            inlineSneak.style = `text-align:center;display: flex;flex-direction:column;align-items: center;justify-content:center;font-size:30px;padding:30px;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;`;
            (function waitForLandscape() {
              function check() {
                if (window.innerWidth > window.innerHeight) {
                  location.reload();
                }
              }

              // check immediately in case it's already true
              check();

              // then watch for resize/orientation changes
              window.addEventListener('resize', check);
              window.addEventListener('orientationchange', check);
            })();
            return;
          }
          document.body.style.zoom=window.innerWidth/1500;
        }

        // create and show loader container
        const loaderContainer = document.createElement("div");
        loaderContainer.className = "loader-container";
        loaderContainer.innerHTML = `\n          <span>Loading SpectroDraw Pro, please wait...</span>\n          <div class="loader" aria-hidden="true"></div>\n        `;
        inlineSneak.appendChild(loaderContainer);

        const KV_URL = 'https://api.spectrodraw.com/api/load-sneak-peak';

        // helper to cleanup
        let cleaned = false;
        function cleanup(success) {
          if (cleaned) return;
          cleaned = true;
          try { loaderContainer.remove(); } catch (e) {}
          window.__spectrodraw_pro_loading = false;
          if (success) hasLoadedPro = true;
          try { window.removeEventListener('spectrodraw-pro-ready', onReady); } catch (e) {}
        }

        // event handler when bootstrap indicates iframe loaded
        function onReady(ev) {
          console.log('spectrodraw-pro-ready', ev && ev.detail);
          clearTimeout(readyTimeout);
          cleanup(true);
        }

        // fallback in case load event never fires
        const readyTimeout = setTimeout(() => {
          console.warn('sneak-peek ready timeout — cleaning up anyway');
          cleanup(true); // mark as loaded to avoid repeated tries
        }, 15000); // 15s

        window.addEventListener('spectrodraw-pro-ready', onReady, { once: true });

        try {
          const res = await fetch(KV_URL, { cache: 'no-cache' });
          if (!res.ok) throw new Error('KV fetch failed: ' + res.status);

          // IMPORTANT: read as arrayBuffer (preserve bytes)
          const arr = await res.arrayBuffer();
          const blob = new Blob([arr], { type: 'application/javascript' });
          const blobUrl = URL.createObjectURL(blob);

          const scriptEl = document.createElement('script');
          scriptEl.src = blobUrl;
          scriptEl.onload = () => {
            // bootstrap loaded in parent; do not cleanup here — wait for 'spectrodraw-pro-ready'
            URL.revokeObjectURL(blobUrl);
            console.log('bootstrap script loaded; waiting for iframe ready event...');
          };
          scriptEl.onerror = (e) => {
            console.error('Error executing fetched bundle', e);
            URL.revokeObjectURL(blobUrl);
            clearTimeout(readyTimeout);
            cleanup(false);
          };

          document.head.appendChild(scriptEl);
        } catch (err) {
          console.error('loadPro error:', err);
          clearTimeout(readyTimeout);
          cleanup(false);
        }
      }

      // start loading as soon as the DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadPro, { once: true });
      } else {
        loadPro();
      }

      // expose to window for manual retry or debugging
      window.spectrodrawSneak = { loadPro };
    })();
    window.addEventListener('message', function (ev) {console.log(ev);
      const msg = ev && ev.data;
      if (msg && msg.type === 'spectrodraw:continueToCheckout') {
        window.open("./index.html", "_blank");
      }
    });
  </script>
</body>
</html>
