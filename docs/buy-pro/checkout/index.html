<style>

<body>
<nav class="nav">
    <div class="nav-left">
      <a href="/" class="brand">SpectroDraw</a>
    </div>
    <div class="nav-right">
      <a href="#" id="signup-link" class="nav-link">Sign up</a>
      <a href="#" id="signin-link" class="nav-link">Sign in</a>
      <a target="_blank" rel="noopener" href="https://mail.google.com/mail/u/0/?fs=1&tf=cm&source=mailto&to=clipriot3@gmail.com" id="support-link" class="nav-link">Support</a>
    </div>
  </nav>
  <div id="login-panel" class="modal-overlay" aria-hidden="true">
    <div id="login-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="login-title">
      <button class="modal-close" aria-label="Close">&times;</button>

      <h2 id="login-title">Sign in</h2>

      <form id="login-form" autocomplete="on">
        <div class="field">
          <label class="label-text" for="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
        </div>
        <div class="field signup-only" style="display:none;">
          <label class="label-text" for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="pick-a-username" />
        </div>
        <div class="field">
          <label class="label-text" for="password">Password</label>
          <input id="password" name="password" type="password" required placeholder="Password" />
        </div>
        <div class="field signup-only" style="display:none;">
          <label class="label-text" for="confirm-password">Confirm Password</label>
          <input id="confirm-password" name="confirm-password" type="password" placeholder="Confirm password" />
        </div>
        <button id="primary-btn" type="submit" class="primary">Sign in</button>
        <div class="aux">
          <button id="toggle-signup" type="button" class="link-btn">New? Sign up</button>
          <button id="google-login" type="button" class="google">
            <span class="g-icon" aria-hidden="true">
              <img src="../../assets/Google__G__logo.svg" alt="">

  <link rel="stylesheet" type="text/css" href="../../accounts.css">
<div class="container" id="checkout-page">
  <h2>SpectroDraw Pro</h2>
  <p>$40.00</p>
  <p id="purchasingfor" style="color:var(--muted);margin-bottom:10px!important;">Purchasing for: </p>

  <div id="paypal-button-container"></div>
  <p id="error" style="color:red;"></p>
</div>

<div id="success-page">
  <div style="text-align:center;">
    <h1>Thank you</h1>
    <p>Your order has been processed.</p>
    <button class="pay-btn" onclick="location.href='../../products'">View my products</button>
  </div>
</div>

<script src="../../accounts.js"></script>

<script>
function getCurrentUserEmail() {
  try {
    const raw = localStorage.getItem('spectrodraw_user');
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return parsed?.email || null;
  } catch { return null; }
}

function setCookie(name, value, days) {
  document.cookie = name + "=" + value + ";path=/;max-age=" + (days*86400);
}
function getCookie(name) {
  return document.cookie.split('; ').find(r => r.startsWith(name+"="))?.split('=')[1];
}
function finishCookie(email) {
  return "finish_" + encodeURIComponent(email);
}

function showSuccess() {
  document.getElementById("checkout-page").style.display = "none";
  document.getElementById("success-page").style.display = "flex";
}

function showFinishPage() {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;">
      <div style="text-align:center;">
        <h1>You're all set</h1>
        <p>You already own SpectroDraw Pro.</p>
        <button onclick="location.href='../../products'" class="pay-btn">View products</button>
      </div>
    </div>
  `;
}

async function checkUserPurchase() {
  const email = getCurrentUserEmail();
  if (!email) return false;

  const res = await fetch('https://api.spectrodraw.com/api/products', {
    credentials:'include'
  });

  const j = await res.json();
  return j.products?.some(p => p.email?.toLowerCase() === email.toLowerCase());
}

paypal.Buttons({

  async createOrder() {
    const stored = localStorage.getItem('spectrodraw_user');

    const res = await fetch("https://api.spectrodraw.com/api/orders", {
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        cart:[{id:"SPECTRODRAW_PRO", quantity:1}],
        currency:"USD",
        user: stored
      })
    });

    const data = await res.json();
    return data.id;
  },

  async onApprove(data) {
    const stored = localStorage.getItem('spectrodraw_user');

    const capture = await fetch(
      `https://api.spectrodraw.com/api/orders/${data.orderID}/capture`,
      {
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ user: stored })
      }
    );

    const payload = await capture.json();

    const status = payload?.purchase_units?.[0]?.payments?.captures?.[0]?.status;

    if (status !== "COMPLETED") {
      document.getElementById("error").textContent = "Payment failed.";
      return;
    }

    const claim = await fetch('https://api.spectrodraw.com/api/make-purchase', {
      method:'POST',
      credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ user: stored })
    });

    if (!claim.ok) {
      document.getElementById("error").textContent =
        "Payment succeeded but claim failed.";
      return;
    }

    const email = getCurrentUserEmail();
    if (email) setCookie(finishCookie(email), "1", 365);

    showSuccess();
  },

  onError(err) {
    document.getElementById("error").textContent = "Checkout error.";
    console.error(err);
  }

}).render('#paypal-button-container');

(async () => {
  const email = getCurrentUserEmail();

  if (email && getCookie(finishCookie(email))) {
    showFinishPage();
    return;
  }

  const already = await checkUserPurchase();
  if (already) {
    setCookie(finishCookie(email), "1", 365);
    showFinishPage();
  }
})();
</script>

</body>
</html>
