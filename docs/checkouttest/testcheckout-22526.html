<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Checkout</title>

<!-- Load PayPal SDK (hosted-fields + buttons + card funding) -->
<script src="https://www.paypal.com/sdk/js?client-id=Aav5jVmFqcCz1XoQNDPt-x64R-Ldkcx8IDVKBubbVbZVae9hH1BT1hiwqSiPol5qihKvvPYG6_9JfN-9&components=buttons,hosted-fields&enable-funding=card"></script>

<style>
  :root{ --max-width:1100px; --accent:#111827; --muted:#6b7280; --panel:#fff; --shadow: 0 6px 20px rgba(16,24,40,0.06); }
  body{ font-family: Inter,system-ui,Arial; background:#f6f7f8; margin:24px; display:flex; justify-content:center; }
  .wrap{ max-width:var(--max-width); width:100%; display:grid; grid-template-columns: 1fr 380px; gap:28px; }
  .panel{ background:var(--panel); padding:24px; border-radius:8px; box-shadow:var(--shadow); }
  h2,h3{ margin:0 0 12px 0; font-weight:600; color:var(--accent); }
  .muted{ color:var(--muted); font-size:14px; }
  .field{ margin:10px 0; }
  input[type="text"], input[type="email"], select{
    width:100%; padding:12px; border:1px solid #e5e7eb; border-radius:6px; font-size:14px;
  }
  .separator{ text-align:center; color:var(--muted); margin:18px 0; position:relative; }
  .separator::before,.separator::after{ content:""; height:1px; background:#e6e6e6; position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); }
  .separator span{ position:relative; display:inline-block; background:var(--panel); padding:0 12px; }
  /* PayPal container */
  #paypal-button-container{ margin-top:6px; }
  /* Hosted Fields placeholders */
  .card-field{ height:44px; border:1px solid #e5e7eb; border-radius:6px; padding:8px; display:flex; align-items:center; font-size:15px; background:white; }
  .card-label{ font-size:13px; color:var(--muted); margin-bottom:6px; }
  .pay-btn{ display:inline-block; padding:12px 18px; background:#111827; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600; }
  .order-summary h3{ margin-bottom:8px; }
  .line{ display:flex; justify-content:space-between; margin:12px 0; color:var(--muted); }
  .total{ font-size:20px; font-weight:700; color:var(--accent); }
  .error{ color:#b91c1c; font-size:13px; margin-top:8px; }
  .paypal-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:6px; }
  .paypal-btn-slot { width:calc(50% - 12px); }
</style>
</head>
<body>
  <div class="wrap">
    <!-- LEFT: Checkout form -->
    <div class="panel" id="checkout-panel">
      <h2>Checkout</h2>
      <h3>Express checkout</h3>
      <div id="paypal-row" class="paypal-row" aria-hidden="false">
        <div id="paypal-button" class="paypal-btn-slot"></div>
        <div id="paylater-button" class="paypal-btn-slot"></div>
      </div>
      <div class="separator" aria-hidden="true"></div>
      <h3>Or continue below to pay with card</h3>
      
      <hr style="margin:18px 0; border:none; border-top:1px solid #f0f0f0;" />

      <div>
        <div class="field">
          <label class="card-label">Card number</label>
          <div id="card-number" class="card-field" aria-label="Card number"></div>
        </div>

        <div style="display:flex; gap:12px;">
          <div style="flex:1" class="field">
            <label class="card-label">Expiry</label>
            <div id="expiration-date" class="card-field"></div>
          </div>
          <div style="width:120px" class="field">
            <label class="card-label">CVC</label>
            <div id="cvv" class="card-field"></div>
          </div>
        </div>

      </div>

      <h3>Contact</h3>

      <div class="field">
        <input id="email" type="email" placeholder="you@example.com" required>
      </div>
      <div style="margin-top:12px;">
        <button id="pay-card" class="pay-btn">Pay $40.00</button>
        <div id="card-error" class="error" role="alert" aria-live="polite"></div>
      </div>
    </div>

    <!-- RIGHT: Order summary -->
    <aside class="panel order-summary">
      <h3>Order summary</h3>
      <div style="display:flex; gap:12px; align-items:center;">
        <div>
          <div style="font-weight:600">SpectroDraw Pro</div>
        </div>
      </div>

      <div class="line" style="margin-top:18px;">
        <div class="muted">Subtotal</div>
        <div class="muted">$40.00</div>
      </div>
      <div class="line" style="border-top:1px dashed #eee; padding-top:12px;">
        <div class="total">Total</div>
        <div class="total">40.00</div>
      </div>
      <p class="muted" style="margin-top:8px; font-size:13px;">Secure payments powered by PayPal. You can also pay with major credit cards.</p>
    </aside>
  </div>

<script>
/*
  Client-side: uses two endpoints:
    POST /create-order   -> returns { id: "<paypal-order-id>" }
    POST /capture-order  -> accepts { orderID } and returns capture result

  Hosted Fields docs reference: https://developer.paypal.com/docs/checkout/hosted-fields/
*/

const payButton = document.getElementById('pay-card');
const cardError = document.getElementById('card-error');

// 1) Render PayPal Smart Buttons -> server creates the order (so amounts are validated on server)
const createOrderFunc = () => fetch('https://api.spectrodraw.com/create-order', {
  method: 'POST',
  headers: {'content-type':'application/json'},
  body: JSON.stringify({ intent:'CAPTURE', source: 'paypal' })
}).then(res => res.json()).then(data => data.id);

const onApproveFunc = (data) => {
  return fetch('https://api.spectrodraw.com/capture-order', {
    method: 'POST',
    headers: {'content-type':'application/json'},
    body: JSON.stringify({ orderID: data.orderID })
  }).then(r => r.json()).then(result => {
    if (result.status === 'COMPLETED') {
      window.location = '/success'; // or show a message
    } else {
      console.error(result);
      alert('Payment not completed');
    }
  });
};

// Render the standard PayPal button
paypal.Buttons({
  fundingSource: paypal.FUNDING.PAYPAL,
  style: { layout: 'horizontal', color: 'gold', height: 44 },
  createOrder: createOrderFunc,
  onApprove: onApproveFunc,
  onError: err => console.error('PayPal button error', err)
}).render('#paypal-button');

// Render the Pay Later button (separate slot)
paypal.Buttons({
  fundingSource: paypal.FUNDING.PAYLATER,
  style: { layout: 'horizontal', color: 'gold', height: 44 }, // style examples
  createOrder: createOrderFunc,
  onApprove: onApproveFunc,
  onError: err => console.error('Pay Later button error', err)
}).render('#paylater-button');


// 2) Hosted Fields: Card payments handled by PayPal hosted iframes (no card data on your server)
if (paypal.HostedFields && paypal.HostedFields.isEligible()) {

  paypal.HostedFields.render({
    styles: {
      'input': { 'font-size':'16px', 'color':'#111827' },
      '.invalid': { color: '#b91c1c' }
    },
    createOrder: function() {
      // create order on server (so client can't change amount)
      return fetch('https://api.spectrodraw.com/create-order', {
        method: 'POST',
        headers: {'content-type':'application/json'},
        body: JSON.stringify({ intent:'CAPTURE', source: 'card' })
      }).then(r => r.json()).then(data => data.id);
    },
    fields: {
      number: { selector: '#card-number', placeholder: '4111 1111 1111 1111' },
      cvv:    { selector: '#cvv', placeholder: '123' },
      expirationDate: { selector: '#expiration-date', placeholder: 'MM/YY' }
    }
  }).then(function(cardFields) {

    payButton.addEventListener('click', function (ev) {
      ev.preventDefault();
      cardError.textContent = '';

      // submit triggers any 3DS or bank authentications; resolves with { orderId }
      cardFields.submit({ contingencies: ['3D_SECURE'] })
        .then(function (payload) {
          // payload.orderId is the PayPal order ID — capture it on server to complete payment
          return fetch('https://api.spectrodraw.com/capture-order', {
            method: 'POST',
            headers: {'content-type':'application/json'},
            body: JSON.stringify({ orderID: payload.orderId })
          }).then(res => res.json()).then(result => {
            if (result.status === 'COMPLETED') {
              alert('Card payment completed — Thank you!');
            } else {
              cardError.textContent = 'Payment failed — see console for details.';
              console.log(result);
            }
          });
        })
        .catch(function (err) {
          console.error('Card submit error', err);
          cardError.textContent = err && err.message ? err.message : 'Payment error';
        });
    });

  }).catch(function(err){
    console.error('HostedFields.render error', err);
    // fall back: you could hide card form and only show PayPal button
    document.getElementById('card-form')?.classList?.add('hidden');
  });

} else {
  // Not eligible (mobile/browser), hide hosted fields or show a message
  document.getElementById('card-form')?.classList?.add('hidden');
}
</script>
</body>
</html>
